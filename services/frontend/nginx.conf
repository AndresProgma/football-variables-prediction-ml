server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos (js, css, imágenes)
    location /static/ {
        try_files $uri =404;
        expires 1h;
    }

    # Panel admin
    location = /admin {
        try_files /admin.html =404;
    }

    # Proxy: todos los endpoints del API → api:8000
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    location /partidos {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /evaluaciones {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /predicciones {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
